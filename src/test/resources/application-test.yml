spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  cache:
    type: simple
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-key-banco-cuscatlan-2026-must-be-at-least-256-bits-long
    expiration: 86400000
  cache:
    cache-name: default
    ttl: 3600
  payment:
    base-url: http://localhost:8080
    validate-path: /mock/payments/validate