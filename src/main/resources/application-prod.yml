spring:
  # ===============================
  # DATABASE — PRODUCCIÓN (env vars)
  # ===============================
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  # ===============================
  # JPA / HIBERNATE
  # ===============================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": false

  # ===============================
  # CACHE
  # ===============================
  cache:
    type: simple
    cache-names: default

# ===============================
# LOGGING (PROD — solo WARN+)
# ===============================
logging:
  level:
    root: WARN
    "[com.pruebatecnica.bancocuscatlan]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.flywaydb]": INFO

# ===============================
# APP CUSTOM PROPERTIES
# ===============================
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  cache:
    cache-name: default
    ttl: ${CACHE_TTL:3600}
  payment:
    base-url: ${PAYMENT_BASE_URL:http://localhost:8080}
    validate-path: ${PAYMENT_VALIDATE_PATH:/mock/payments/validate}

# ===============================
# RESILIENCE4J
# ===============================
resilience4j:
  circuitbreaker:
    instances:
      paymentValidation:
        slidingWindowSize: 20
        failureRateThreshold: 40
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
      default:
        slidingWindowSize: 20
        failureRateThreshold: 40
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      default:
        maxAttempts: 2
        waitDuration: 1000ms
  timelimiter:
    instances:
      paymentValidation:
        timeoutDuration: 2s
      default:
        timeoutDuration: 3s
