services:
  postgres:
    image: postgres:16-alpine
    container_name: banco-cuscatlan-postgres
    environment:
      POSTGRES_DB: banco_cuscatlan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - banco-cuscatlan-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d banco_cuscatlan"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banco-cuscatlan-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/banco_cuscatlan
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: docker-secret-key-banco-cuscatlan-2026-must-be-at-least-256-bits-long
      JWT_EXPIRATION: 86400000
      CACHE_TTL: 3600
      PAYMENT_BASE_URL: http://localhost:8080
      PAYMENT_VALIDATE_PATH: /mock/payments/validate
    ports:
      - "8080:8080"

volumes:
  banco-cuscatlan-data: